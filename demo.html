<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ipaddress.js</title>
<style>
body{
display:flex;
flex-direction:column;
align-items:center;
}
#top{
padding:20px 20px;
font-size:20px;
}
#ip{
padding:20px 20px;
font-size:30px;
border:1px solid grey;
}
</style>
<script type="importmap">{"imports":{"ipaddress.js":"./ipaddress.js"}}</script>
</head>
<body>
<div id="top">Demo ipaddress.js</div>
<div id="ip"></div>
<div id="bar">Lookup</div>
<script type="module">
import {getIpAddress} from 'ipaddress.js'
try {
const ip=await getIpAddress()
document.getElementById('ip').textContent=ip
document.getElementById('bar').textContent='Finish'
}catch(e){
document.getElementById('bar').textContent=e
}
</script>
</body>
</html>
